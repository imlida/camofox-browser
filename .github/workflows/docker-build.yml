name: Docker Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  IMAGE_NAME: aigood/camofox-browser
  VERSION: 135.0.1
  RELEASE: beta.24

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
            camoufox_arch: x86_64
            ytdlp_arch: ""
          - arch: aarch64
            platform: linux/arm64
            camoufox_arch: arm64
            ytdlp_arch: "_aarch64"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download Camoufox binary
        run: |
          mkdir -p dist
          curl -fSL "https://github.com/daijro/camoufox/releases/download/v${VERSION}-${RELEASE}/camoufox-${VERSION}-${RELEASE}-lin.${{ matrix.camoufox_arch }}.zip" -o "dist/camoufox-${{ matrix.arch }}.zip"
          ls -la "dist/camoufox-${{ matrix.arch }}.zip"

      - name: Download yt-dlp binary
        run: |
          mkdir -p dist
          curl -fSL "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux${{ matrix.ytdlp_arch }}" -o "dist/yt-dlp-${{ matrix.arch }}"
          chmod +x "dist/yt-dlp-${{ matrix.arch }}"
          ls -la "dist/yt-dlp-${{ matrix.arch }}"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          tags: ${{ env.IMAGE_NAME }}
          push: true
          outputs: type=image,push-by-digest=true,name-canonical=true
          build-args: |
            ARCH=${{ matrix.arch }}
            CAMOUFOX_VERSION=${{ env.VERSION }}
            CAMOUFOX_RELEASE=${{ env.RELEASE }}

      - name: Export digest
        run: |
          mkdir -p digests
          echo "${{ steps.build.outputs.digest }}" > "digests/digest-${{ matrix.arch }}.txt"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: digests/digest-${{ matrix.arch }}.txt

      - name: Verify x86_64 image
        if: matrix.platform == 'linux/amd64'
        run: |
          docker pull ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          docker run --rm ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }} node -e "console.log('ok')"

      - name: Verify aarch64 image
        if: matrix.platform == 'linux/arm64'
        run: |
          docker manifest inspect ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }} > /dev/null && echo "aarch64 manifest inspect ok"

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: digests
          pattern: digest-*

      - name: Read digests
        id: digest
        run: |
          echo "x86_64=$(cat digests/digest-x86_64/digest-x86_64.txt)" >> "$GITHUB_OUTPUT"
          echo "aarch64=$(cat digests/digest-aarch64/digest-aarch64.txt)" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=${{ env.VERSION }}-${{ env.RELEASE }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Create and push multi-arch manifest
        run: |
          TAGS=""
          while IFS= read -r line; do
            [ -n "$line" ] && TAGS="$TAGS -t $line"
          done <<< "${{ steps.meta.outputs.tags }}"

          docker buildx imagetools create \
            $TAGS \
            ${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.x86_64 }} \
            ${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.aarch64 }}
